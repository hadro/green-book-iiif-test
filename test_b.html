<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test B — Letterbox correction (x=560) — canvas 2560×2560</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #mirador { height: 100%; }
    #label { position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
             background: rgba(0,0,0,.7); color: #fff; padding: 4px 12px;
             border-radius: 4px; font: 13px/1.4 sans-serif; z-index: 999; pointer-events: none; }
  </style>
</head>
<body>
  <div id="label">Test B — letterbox correction (canvas 2560×2560, ann x≈560 for Pruitt's)</div>
  <div id="mirador"></div>
  <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
  <script>
    Mirador.viewer({
      id: "mirador",
      windows: [{
        manifestId: "https://hadro.github.io/green-book-iiif-test/test_b_manifest.json",
        thumbnailNavigationPosition: "far-bottom",
      }],
      workspace: { showZoomControls: true },
      workspaceControlPanel: { enabled: false },
      osdConfig: { crossOriginPolicy: "Anonymous", ajaxWithCredentials: false },
    });
  </script>
</body>
</html>
